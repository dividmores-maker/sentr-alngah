<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي - لوحة المدرس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="app.css">
<style>
  .profile-header{
    background: linear-gradient(135deg, var(--teal-deep), var(--teal));
    border-radius: 22px; padding: 32px 36px; color:#fff;
    display:flex; align-items:center; gap:20px;
    position: relative; overflow:hidden; margin-bottom: 26px;
  }
  .profile-header::after{
    content:''; position:absolute; left:-50px; top:-50px;
    width:180px; height:180px; border-radius:50%;
    background: rgba(232,163,61,.18);
  }
  .profile-header .big-avatar{
    width:84px; height:84px; border-radius:22px;
    background: rgba(255,255,255,.12);
    display:flex; align-items:center; justify-content:center;
    font-size:40px; flex-shrink:0;
  }
  .profile-header h2{ font-size:24px; font-weight:900; margin-bottom:6px; }
  .profile-header .meta{ display:flex; gap:14px; flex-wrap:wrap; font-size:13px; opacity:.9; }
  .profile-header .meta span{ background: rgba(255,255,255,.12); padding:5px 14px; border-radius:999px; }

  .section-title{ font-size: 18px; font-weight:900; color: var(--teal-deep); margin: 0 0 16px; }
  .info-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 14px 4px; border-bottom: 1px solid var(--line); font-size:14px;
  }
  .info-row:last-child{ border-bottom:none; }
  .info-row .label{ color: var(--ink-soft); font-weight:600; }
  .info-row .value{ color: var(--ink); font-weight:700; }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="blob ab1"></div>
  <div class="blob ab2"></div>
  <div class="blob ab3"></div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">ن</div>
      لوحة المدرس
    </div>
    <a class="nav-item" href="admin.html"><span class="ic">🏠</span><span>الرئيسية</span></a>
    <a class="nav-item" href="admin-courses.html"><span class="ic">📚</span><span>الكورسات</span></a>
    <a class="nav-item" href="admin-lessons.html"><span class="ic">🎥</span><span>الدروس</span></a>
    <a class="nav-item" href="admin-quizzes.html"><span class="ic">📝</span><span>الاختبارات</span></a>
    <a class="nav-item" href="admin-students.html"><span class="ic">👥</span><span>طلابي والنتائج</span></a>
    <a class="nav-item active" href="admin-profile.html"><span class="ic">⚙️</span><span>الملف الشخصي</span></a>
    <div class="sidebar-foot">
      <button class="logout-btn" onclick="logout()"><span class="ic">🚪</span><span>تسجيل الخروج</span></button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div>
          <h1>الملف الشخصي</h1>
          <div class="page-sub">بياناتك وإعدادات حسابك</div>
        </div>
      </div>
      <div class="user-chip">
        <div class="avatar" id="avatarChip">👨‍🏫</div>
        <div class="info">
          <b id="userName">...</b>
          <span>مدرس</span>
        </div>
      </div>
    </div>

    <div class="content">

      <div class="profile-header">
        <div class="big-avatar" id="bigAvatar">👨‍🏫</div>
        <div>
          <h2 id="profileName">...</h2>
          <div class="meta">
            <span id="profilePhone">...</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">البيانات الشخصية</div>
        <div class="info-row"><span class="label">الاسم</span><span class="value" id="infoName">-</span></div>
        <div class="info-row"><span class="label">رقم الهاتف (الدخول)</span><span class="value" id="infoPhone">-</span></div>
      </div>

      <div class="section-title" style="margin-top:30px;">تغيير كلمة المرور</div>
      <div class="card">
        <p style="font-size:13px; color: var(--ink-soft); margin-bottom:18px; line-height:1.8;">
          غيّر كلمة مرورك بشكل دوري، وخصوصًا لو حسابك بكلمة المرور الافتراضية.
        </p>
        <div class="field">
          <label>كلمة المرور الحالية</label>
          <input type="password" id="currentPassword" placeholder="••••••••">
        </div>
        <div class="field">
          <label>كلمة المرور الجديدة</label>
          <input type="password" id="newPassword" placeholder="•••••••• (6 أحرف على الأقل)">
        </div>
        <button class="btn btn-solid" id="changePwdBtn" onclick="changePassword()">تغيير كلمة المرور</button>
        <div id="pwdMsg" class="form-msg"></div>
      </div>

    </div>
  </div>
</div>

<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="teachers.js"></script>
<script>
  requireAuth(async (user, profile)=>{
    document.getElementById('userName').textContent = profile.name;
    document.getElementById('avatarChip').textContent = profile.avatar || '👨‍🏫';
    document.getElementById('bigAvatar').textContent = profile.avatar || '👨‍🏫';
    document.getElementById('profileName').textContent = profile.name;
    document.getElementById('profilePhone').textContent = profile.phone || '';
    document.getElementById('infoName').textContent = profile.name || '-';
    document.getElementById('infoPhone').textContent = profile.phone || '-';
  }, 'admin');

  function showPwdMsg(text, type){
    const box = document.getElementById('pwdMsg');
    box.textContent = text;
    box.className = 'form-msg show ' + type;
  }

  async function changePassword(){
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const btn = document.getElementById('changePwdBtn');

    if(!currentPassword || !newPassword){
      showPwdMsg('من فضلك اكتب كلمة المرور الحالية والجديدة.', 'error');
      return;
    }
    if(newPassword.length < 6){
      showPwdMsg('كلمة المرور الجديدة لازم تكون 6 أحرف على الأقل.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'جاري التغيير...';

    try{
      const user = firebase.auth().currentUser;
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPassword);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPassword);

      await db.collection('users').doc(user.uid).update({ mustChangePassword: false });

      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      showPwdMsg('تم تغيير كلمة المرور بنجاح.', 'success');
    } catch(e){
      console.error(e);
      let msg = 'حدث خطأ أثناء التغيير، حاول مرة أخرى.';
      if(e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'){
        msg = 'كلمة المرور الحالية غير صحيحة.';
      }
      showPwdMsg(msg, 'error');
    } finally{
      btn.disabled = false;
      btn.textContent = 'تغيير كلمة المرور';
    }
  }
</script>

</body>
</html>
