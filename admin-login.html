<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول المدرسين - مركز النجاح</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg: #FBF8F1;
    --ink: #16241F;
    --ink-soft: #5C6F6A;
    --teal: #1F6F5C;
    --teal-deep: #0F3D33;
    --gold: #E8A33D;
    --gold-deep: #C77F1F;
    --coral: #E0623E;
    --line: rgba(15,61,51,0.12);
    --card: #FFFFFF;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(155deg, var(--teal-deep) 0%, #081F19 100%);
    color: var(--ink);
    min-height: 100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }
  h1,h2,h3,.btn{ font-family:'Cairo',sans-serif; }

  /* ===== Animated ambient background ===== */
  .ambient-bg{ position: fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .ambient-bg .blob{ position:absolute; border-radius:50%; filter: blur(80px); animation: ambient-float 20s ease-in-out infinite; }
  .ambient-bg .b1{ width:480px; height:480px; background: var(--gold); opacity:.16; top:-180px; left:-140px; }
  .ambient-bg .b2{ width:380px; height:380px; background: var(--coral); opacity:.14; bottom:-160px; right:-120px; animation-delay:-7s; }
  .ambient-bg .b3{ width:300px; height:300px; background: var(--teal); opacity:.2; top:55%; left:65%; animation-delay:-13s; }
  @keyframes ambient-float{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-26px) scale(1.08); }
  }

  .login-box{
    background: var(--card);
    border-radius: 28px;
    width:100%; max-width: 420px;
    padding: 46px 40px;
    box-shadow: 0 60px 120px -30px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);
    position: relative; z-index: 1;
    animation: cardPop .5s cubic-bezier(.2,.85,.3,1.2);
    transform-style: preserve-3d;
  }
  @keyframes cardPop{
    from{ transform: translateY(28px) scale(.95); opacity:0; }
    to{ transform: translateY(0) scale(1); opacity:1; }
  }
  .mark{
    width: 62px; height:62px; border-radius: 19px;
    background: linear-gradient(150deg, var(--teal), var(--teal-deep));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:900; font-size:27px;
    margin: 0 auto 22px;
    box-shadow: 0 14px 30px -6px rgba(15,61,51,.55), inset 0 1px 0 rgba(255,255,255,.2);
  }
  h1{ text-align:center; font-size: 22px; color: var(--teal-deep); font-weight:900; margin-bottom:6px; letter-spacing:-.3px; }
  p.sub{ text-align:center; color: var(--ink-soft); font-size:13.5px; margin-bottom: 32px; }

  .field{ margin-bottom: 18px; }
  .field label{
    display:block; font-size:13px; font-weight:700; color: var(--teal-deep);
    margin-bottom:8px;
  }
  .field input{
    width:100%; padding: 13px 16px; border-radius: 13px;
    border: 1.5px solid var(--line); background: var(--bg);
    font-family:'Tajawal',sans-serif; font-size:14px; color: var(--ink);
    outline:none; transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus{
    border-color: var(--teal);
    box-shadow: 0 0 0 4px rgba(31,111,92,.12);
  }

  .btn{
    width:100%; border:none; cursor:pointer;
    font-weight:800; font-size:15px;
    padding: 15px 0;
    border-radius: 999px;
    background: linear-gradient(150deg, var(--teal), var(--teal-deep));
    color:#fff;
    box-shadow: 0 12px 26px -6px rgba(15,61,51,.5), inset 0 1px 0 rgba(255,255,255,.15);
    transition: transform .2s cubic-bezier(.2,.8,.3,1.3), box-shadow .25s ease;
  }
  .btn:hover:not(:disabled){ box-shadow: 0 16px 32px -6px rgba(15,61,51,.55); transform: translateY(-2px); }
  .btn:active{ transform: scale(.96); }
  .btn:disabled{ opacity:.7; cursor:not-allowed; }

  .msg{
    display:none; margin-bottom:18px; padding:12px 16px; border-radius:12px;
    font-size:13px; font-weight:600; text-align:center;
  }
  .msg.show{ display:block; }
  .msg.error{ background: rgba(224,98,62,.1); color:var(--coral-deep, #B8492F); }
  .msg.success{ background: rgba(31,111,92,.1); color:var(--teal-deep); }

  .back-link{
    display:block; text-align:center; margin-top: 22px;
    font-size: 13px; color: var(--ink-soft); text-decoration:none;
    transition: color .2s;
  }
  .back-link:hover{ color: var(--teal-deep); }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="login-box">
  <div class="mark">ن</div>
  <h1>دخول المدرسين</h1>
  <p class="sub">صفحة خاصة بالمدرسين والإدارة لمتابعة وإدارة الكورسات</p>

  <div id="loginMsg" class="msg"></div>

  <form id="adminLoginForm">
    <div class="field">
      <label>رقم الهاتف</label>
      <input type="tel" id="loginPhone" placeholder="مثال: 0100000001" required>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">دخول</button>
  </form>

  <a class="back-link" href="index.html">رجوع لمنصة الطلاب</a>
</div>

<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script>
  function showMsg(text, type){
    const box = document.getElementById('loginMsg');
    box.textContent = text;
    box.className = 'msg show ' + type;
  }
  function hideMsg(){
    document.getElementById('loginMsg').className = 'msg';
  }

  document.getElementById('adminLoginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    hideMsg();

    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.textContent = 'لحظات...';

    try{
      const user = await loginWithPhone(phone, password);
      const profile = await getUserProfile(user.uid);

      if(!profile || profile.role !== 'admin'){
        await auth.signOut();
        showMsg('هذا الحساب غير مسجل كمدرس. لو إنت طالب، استخدم صفحة الطلاب.', 'error');
        btn.disabled = false;
        btn.textContent = 'دخول';
        return;
      }

      showMsg('تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');
      window.location.href = 'admin.html';
    } catch(err){
      showMsg(translateAuthError(err), 'error');
      btn.disabled = false;
      btn.textContent = 'دخول';
    }
  });

  // لو المدرس مسجل دخول بالفعل، حوّله مباشرة
  auth.onAuthStateChanged(async (user)=>{
    if(user){
      const profile = await getUserProfile(user.uid);
      if(profile && profile.role === 'admin'){
        window.location.href = 'admin.html';
      }
    }
  });

  // تفاعل خفيف للبطاقة مع حركة الماوس (عمق 3D)
  (function cardTilt(){
    const box = document.querySelector('.login-box');
    if(!box) return;
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    if(window.matchMedia('(max-width: 600px)').matches) return;

    document.addEventListener('mousemove', (e)=>{
      const rect = box.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const dx = (e.clientX - cx) / window.innerWidth;
      const dy = (e.clientY - cy) / window.innerHeight;
      box.style.transform = `rotateY(${dx*4}deg) rotateX(${-dy*4}deg)`;
    });
    document.addEventListener('mouseleave', ()=>{
      box.style.transform = '';
    });
  })();
</script>

</body>
</html>
