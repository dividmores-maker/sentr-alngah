<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدروس - مركز النجاح</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="app.css">
<style>
  .layout{ display:grid; grid-template-columns: 1fr 360px; gap: 24px; align-items:start; }
  @media (max-width: 1100px){ .layout{ grid-template-columns: 1fr; } }

  .player-card{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
    overflow:hidden;
  }
  .player-frame{
    aspect-ratio: 16/9; background: var(--teal-deep);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:14px;
  }
  .player-frame iframe, .player-frame video{ width:100%; height:100%; border:0; }
  .player-info{ padding: 20px 22px; }
  .player-info h2{ font-size:19px; color: var(--teal-deep); font-weight:900; margin-bottom:8px; }
  .player-info p{ font-size:14px; color: var(--ink-soft); line-height:1.9; margin-bottom: 16px; }

  .resources{ display:flex; gap:10px; flex-wrap:wrap; }
  .resource-link{
    display:flex; align-items:center; gap:8px;
    padding: 10px 16px; border-radius:12px;
    background: var(--bg-soft); color: var(--teal-deep);
    font-size:13px; font-weight:700; text-decoration:none;
    font-family:'Cairo',sans-serif;
  }
  .resource-link:hover{ background: var(--line); }

  /* Lessons list sidebar */
  .lesson-list-card{
    background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
    padding: 18px;
  }
  .lesson-list-card h3{ font-size:15px; color: var(--teal-deep); font-weight:900; margin-bottom:14px; padding: 0 4px; }
  .lesson-item{
    display:flex; align-items:center; gap:12px;
    padding: 12px 12px; border-radius:12px;
    cursor:pointer; transition: background .2s;
    font-size:13.5px; color: var(--ink); font-weight:600;
  }
  .lesson-item:hover{ background: var(--bg-soft); }
  .lesson-item.active{ background: var(--bg-soft); color: var(--teal-deep); }
  .lesson-item .num{
    width:30px; height:30px; border-radius:50%;
    background: var(--bg-soft); color: var(--teal-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:800; flex-shrink:0; font-family:'Cairo',sans-serif;
  }
  .lesson-item.active .num{ background: var(--teal); color:#fff; }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="blob ab1"></div>
  <div class="blob ab2"></div>
  <div class="blob ab3"></div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">ن</div>
      مركز النجاح
    </div>
    <a class="nav-item" href="dashboard.html"><span class="ic">🏠</span><span>الرئيسية</span></a>
    <a class="nav-item" href="courses.html"><span class="ic">📚</span><span>الكورسات</span></a>
    <a class="nav-item active" href="lessons.html"><span class="ic">🎥</span><span>الدروس</span></a>
    <a class="nav-item" href="quizzes.html"><span class="ic">📝</span><span>الاختبارات</span></a>
    <a class="nav-item" href="profile.html"><span class="ic">👤</span><span>الملف الشخصي</span></a>
    <div class="sidebar-foot">
      <button class="logout-btn" onclick="logout()"><span class="ic">🚪</span><span>تسجيل الخروج</span></button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div>
          <h1>الدروس</h1>
          <div class="page-sub" id="courseSub">شاهد الشروحات وحمّل الملفات المرفقة</div>
        </div>
      </div>
      <div class="user-chip">
        <div class="avatar" id="avatarChip">🎓</div>
        <div class="info">
          <b id="userName">...</b>
          <span id="userGrade">...</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="layout">
        <div id="playerArea">
          <div class="loading-state">جاري تحميل الدروس...</div>
        </div>

        <div class="lesson-list-card">
          <h3>قائمة الدروس</h3>
          <div id="lessonList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="teachers.js"></script>
<script>
  let lessons = [];
  let currentIndex = 0;
  let currentProfile = null;

  requireAuth(async (user, profile)=>{
    document.getElementById('userName').textContent = profile.name;
    document.getElementById('userGrade').textContent = profile.grade || '';
    document.getElementById('avatarChip').textContent = profile.avatar || '🎓';
    currentProfile = profile;
    loadLessons();
  });

  function getYouTubeEmbed(url){
    if(!url) return null;
    let id = null;
    const watchMatch = url.match(/[?&]v=([^&]+)/);
    const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
    const embedMatch = url.match(/embed\/([^?&]+)/);
    if(watchMatch) id = watchMatch[1];
    else if(shortMatch) id = shortMatch[1];
    else if(embedMatch) id = embedMatch[1];
    if(id) return `https://www.youtube.com/embed/${id}`;
    return null;
  }

  async function loadLessons(){
    const playerArea = document.getElementById('playerArea');
    const listEl = document.getElementById('lessonList');
    try{
      const params = new URLSearchParams(window.location.search);
      const courseId = params.get('course');

      let lessonsData = [];

      if(courseId){
        const snap = await db.collection('lessons').where('courseId', '==', courseId).get();
        snap.forEach(doc=> lessonsData.push({ id: doc.id, ...doc.data() }));

        const courseDoc = await db.collection('courses').doc(courseId).get();
        if(courseDoc.exists){
          document.getElementById('courseSub').textContent = 'دروس كورس: ' + (courseDoc.data().title || '');
        }
      } else {
        // مفيش كورس محدد: هات كل كورسات مدرس الطالب المتاحة لصفه، وبعدين دروسها
        if(!currentProfile || !currentProfile.teacherId){
          playerArea.innerHTML = `
            <div class="empty-state">
              <div class="ic">👨‍🏫</div>
              <h3>لم يتم تحديد المدرس لحسابك</h3>
              <p>تواصل مع الإدارة لربط حسابك بالمدرس المناسب.</p>
            </div>`;
          listEl.innerHTML = '';
          return;
        }
        const grades = currentProfile.grade ? [currentProfile.grade, 'جميع المراحل'] : ['جميع المراحل'];
        const coursesSnap = await db.collection('courses')
          .where('teacherId', '==', currentProfile.teacherId)
          .where('grade', 'in', grades)
          .get();
        const courseIds = [];
        coursesSnap.forEach(doc=> courseIds.push(doc.id));

        if(courseIds.length > 0){
          // Firestore "in" limited to 30 values - كافي لعدد الكورسات المتوقع
          const snap = await db.collection('lessons').where('courseId', 'in', courseIds.slice(0,30)).get();
          snap.forEach(doc=> lessonsData.push({ id: doc.id, ...doc.data() }));
        }
      }

      lessons = lessonsData;
      lessons.sort((a,b)=> (a.order||0) - (b.order||0));

      if(lessons.length === 0){
        playerArea.innerHTML = `
          <div class="empty-state">
            <div class="ic">🎬</div>
            <h3>لا توجد دروس متاحة حالياً</h3>
            <p>الإدارة بترفع الدروس بشكل مستمر، تابع معانا قريبًا.</p>
          </div>`;
        listEl.innerHTML = '';
        return;
      }

      renderLessonList();
      showLesson(0);
    }catch(e){
      playerArea.innerHTML = `<div class="empty-state"><div class="ic">⚠️</div><h3>حدث خطأ</h3><p>تعذر تحميل الدروس الآن.</p></div>`;
      console.error(e);
    }
  }

  function renderLessonList(){
    const listEl = document.getElementById('lessonList');
    listEl.innerHTML = '';
    lessons.forEach((l, i)=>{
      const item = document.createElement('div');
      item.className = 'lesson-item' + (i === currentIndex ? ' active' : '');
      item.innerHTML = `<div class="num">${i+1}</div><div>${l.title || 'درس بدون عنوان'}</div>`;
      item.onclick = ()=> showLesson(i);
      listEl.appendChild(item);
    });
  }

  function showLesson(index){
    currentIndex = index;
    renderLessonList();
    const l = lessons[index];
    const playerArea = document.getElementById('playerArea');
    const embed = getYouTubeEmbed(l.videoUrl);

    let videoHtml = '';
    if(embed){
      videoHtml = `<iframe src="${embed}" allowfullscreen></iframe>`;
    } else if(l.videoUrl){
      videoHtml = `<video src="${l.videoUrl}" controls></video>`;
    } else {
      videoHtml = `<div>لا يوجد فيديو مرفق لهذا الدرس</div>`;
    }

    let resourcesHtml = '';
    if(l.pdfUrl){
      resourcesHtml += `<a class="resource-link" href="${l.pdfUrl}" target="_blank">📄 تحميل ملف الدرس</a>`;
    }
    const relatedQuiz = l.quizId ? `<a class="resource-link" href="quizzes.html?quiz=${l.quizId}">📝 اختبار الدرس</a>` : '';

    playerArea.innerHTML = `
      <div class="player-card">
        <div class="player-frame">${videoHtml}</div>
        <div class="player-info">
          <h2>${l.title || 'درس'}</h2>
          <p>${l.description || 'تابع الشرح بعناية، وحمّل الملف المرفق للمراجعة.'}</p>
          <div class="resources">${resourcesHtml}${relatedQuiz}</div>
        </div>
      </div>`;
  }
</script>

</body>
</html>
