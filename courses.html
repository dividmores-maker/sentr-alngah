<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكورسات - سنتر النجاح</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="app.css">
<style>
  .filters{ display:flex; gap:10px; margin-bottom: 22px; flex-wrap:wrap; }
  .filter-chip{
    padding: 9px 18px; border-radius:999px;
    border: 1.5px solid var(--line); background: var(--card);
    font-size:13px; font-weight:700; color: var(--ink-soft);
    cursor:pointer; transition: all .2s; font-family:'Cairo',sans-serif;
  }
  .filter-chip.active{ background: var(--teal-deep); color:#fff; border-color: var(--teal-deep); }

  .course-card{
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    overflow:hidden;
    transition: transform .25s ease, box-shadow .25s ease;
    display:flex; flex-direction:column;
  }
  .course-card:hover{ transform: translateY(-6px); box-shadow: 0 20px 40px -18px rgba(31,58,54,.3); }
  .course-thumb{
    height: 110px;
    display:flex; align-items:center; justify-content:center;
    font-size: 36px; color:#fff;
  }
  .course-body{ padding: 16px 18px 20px; flex:1; display:flex; flex-direction:column; }
  .course-body .lvl{
    font-size:11.5px; font-weight:700; color: var(--coral);
    background: rgba(224,98,62,.1); display:inline-block;
    padding:4px 10px; border-radius:999px; margin-bottom: 10px; align-self:flex-start;
  }
  .course-body h3{ font-size: 16px; color: var(--teal-deep); font-weight:800; margin-bottom:6px; }
  .course-body p{ font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; flex:1; }
  .course-body .btn{ width:100%; text-align:center; }

  /* Sidebar overlay */
  .sidebar-overlay{
    display:none; position:fixed; inset:0; z-index:50;
    background: rgba(0,0,0,.45); backdrop-filter: blur(3px);
  }
  .sidebar-overlay.open{ display:block; }

  @media (max-width: 560px){
    .filters{ gap:7px; }
    .filter-chip{ padding:8px 14px; font-size:12.5px; }
    .course-thumb{ height:90px; font-size:30px; }
  }
</style>
</head>
<body>

<div class="ambient-bg">
  <div class="blob ab1"></div>
  <div class="blob ab2"></div>
  <div class="blob ab3"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">ن</div>
      سنتر النجاح 
    </div>
    <a class="nav-item" href="dashboard.html"><span class="ic">🏠</span><span>الرئيسية</span></a>
    <a class="nav-item active" href="courses.html"><span class="ic">📚</span><span>الكورسات</span></a>
    <a class="nav-item" href="lessons.html"><span class="ic">🎥</span><span>الدروس</span></a>
    <a class="nav-item" href="quizzes.html"><span class="ic">📝</span><span>الاختبارات</span></a>
    <a class="nav-item" href="profile.html"><span class="ic">👤</span><span>الملف الشخصي</span></a>
    <div class="sidebar-foot">
      <button class="logout-btn" onclick="logout()"><span class="ic">🚪</span><span>تسجيل الخروج</span></button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="menu-toggle" onclick="openSidebar()">☰</button>
        <div>
          <h1>الكورسات</h1>
          <div class="page-sub">كل الكورسات المتاحة لمرحلتك الدراسية</div>
        </div>
      </div>
      <div class="user-chip">
        <div class="avatar" id="avatarChip">🎓</div>
        <div class="info">
          <b id="userName">...</b>
          <span id="userGrade">...</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div id="coursesGrid" class="grid grid-3">
        <div class="loading-state">جاري تحميل الكورسات...</div>
      </div>
    </div>
  </div>
</div>

<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="teachers.js"></script>
<script>
  const icons = ['📐','🧪','📖','🌍','🔬','📊','🧮','📜'];
  const gradients = [
    'linear-gradient(135deg, var(--teal), var(--teal-deep))',
    'linear-gradient(135deg, var(--gold), var(--gold-deep, #C77F1F))',
    'linear-gradient(135deg, var(--coral), var(--coral-deep, #B8492F))',
    'linear-gradient(135deg, #4a8f7c, var(--teal))'
  ];

  let allCourses = [];

  requireAuth(async (user, profile)=>{
    document.getElementById('userName').textContent = profile.name;
    document.getElementById('userGrade').textContent = profile.grade || '';
    document.getElementById('avatarChip').textContent = profile.avatar || '🎓';
    loadCourses(profile);
  });

  async function loadCourses(profile){
    const grid = document.getElementById('coursesGrid');
    try{
      if(!profile.teacherId){
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="ic">👨‍🏫</div>
            <h3>لم يتم تحديد المدرس لحسابك</h3>
            <p>تواصل مع الإدارة لربط حسابك بالمدرس المناسب.</p>
          </div>`;
        return;
      }
      // كورسات المدرس الخاص بالطالب + لصف الطالب (أو كورسات عامة لكل المراحل)
      const grades = profile.grade ? [profile.grade, 'جميع المراحل'] : ['جميع المراحل'];
      const snap = await db.collection('courses')
        .where('teacherId', '==', profile.teacherId)
        .where('grade', 'in', grades)
        .get();
      if(snap.empty){
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="ic">📭</div>
            <h3>لا توجد كورسات لصفك مع ${profile.teacherName || 'مدرسك'} حالياً</h3>
            <p>الإدارة بتجهز الكورسات، تابع معانا قريبًا.</p>
          </div>`;
        return;
      }
      allCourses = [];
      snap.forEach(doc=> allCourses.push({ id: doc.id, ...doc.data() }));
      renderCourses();
    }catch(e){
      grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div class="ic">⚠️</div><h3>حدث خطأ</h3><p>تعذر تحميل الكورسات الآن.</p></div>`;
      console.error(e);
    }
  }

  function renderCourses(){
    const grid = document.getElementById('coursesGrid');
    const list = allCourses;
    if(list.length === 0){
      grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div class="ic">📭</div><h3>لا توجد كورسات لصفك الدراسي حالياً</h3></div>`;
      return;
    }
    grid.innerHTML = '';
    list.forEach((c, i)=>{
      const icon = c.icon || icons[i % icons.length];
      const grad = gradients[i % gradients.length];
      grid.innerHTML += `
        <div class="course-card">
          <div class="course-thumb" style="background:${grad}">${icon}</div>
          <div class="course-body">
            <span class="lvl">${c.grade || 'جميع المراحل'}</span>
            <h3>${c.title || 'كورس'}</h3>
            <p>${c.description || 'استعرض الدروس والاختبارات المتاحة لهذا الكورس.'}</p>
            <a href="lessons.html?course=${c.id}"><button class="btn btn-solid">عرض الدروس</button></a>
          </div>
        </div>`;
    });
  }
</script>

<script>
  function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSidebar(); });
</script>

</body>
</html>
